name: Feature request
description: Propose a focused improvement to Mend.
title: "feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What real relationship-repair problem needs to be solved?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe success without prescribing an implementation.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Safety, privacy, and evidence constraints
      description: Note crisis-routing, attribution, inclusivity, or private-data implications.
