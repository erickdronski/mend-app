name: TestFlight

# Builds the iOS app on GitHub's macOS runner via `eas build --local`
# (consumes ZERO EAS build quota) and submits the .ipa to TestFlight with
# the ASC API key. Manual dispatch only: macOS runner minutes are 10x, so
# each run costs real free-tier budget (~4 builds/month on the free plan;
# the default $0 spending limit hard-stops overage, no surprise charges).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-submit:
    runs-on: macos-26
    environment: testflight
    # Nalee's identical eas-local build proved ~18 min; macOS bills 10x, so a
    # hang at 90 would bill ~900 min. 60 keeps 3x headroom for the first run.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Select newest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then sudo xcode-select -s "$LATEST/Contents/Developer"; fi
          xcodebuild -version

      - name: Install dependencies
        run: npm ci

      - name: Build iOS (EAS local, no quota)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli build --platform ios --profile production \
            --local --non-interactive \
            --output "$RUNNER_TEMP/mend.ipa"

      - name: Write ASC API key
        run: |
          mkdir -p credentials
          echo "${{ secrets.ASC_KEY_P8 }}" | base64 --decode > credentials/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli submit --platform ios \
            --path "$RUNNER_TEMP/mend.ipa" \
            --non-interactive

      # Only keep the .ipa when something failed (for debugging a bad submit) —
      # on success TestFlight already has the binary, and artifact storage bills.
      - name: Upload ipa artifact
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mend-ipa
          path: ${{ runner.temp }}/mend.ipa
          if-no-files-found: ignore
          retention-days: 2
